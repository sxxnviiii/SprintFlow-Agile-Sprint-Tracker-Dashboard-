{% extends "base.html" %}
{% block title %}Register — SprintFlow{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <h1 class="page-title" style="text-align: center; margin-bottom: 8px;">Create Account</h1>
    <p class="page-subtitle" style="text-align: center; margin-bottom: 32px;">Join your team on SprintFlow</p>
    <form method="POST" class="card">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Role</label>
            <select name="role" class="form-select">
                <option value="developer">Developer</option>
                <option value="scrum_master">Scrum Master</option>
                <option value="product_owner">Product Owner</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Create Account</button>
        <p style="text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted);">
            Have an account? <a href="{{ url_for('login') }}" style="color: var(--accent);">Sign in</a>
        </p>
    </form>
</div>
{% endblock %}
