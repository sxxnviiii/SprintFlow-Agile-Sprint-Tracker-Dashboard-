<!-- templates/new_sprint.html -->
{% extends "base.html" %}
{% block title %}New Sprint — SprintFlow{% endblock %}
{% block content %}
<div style="max-width: 600px;">
    <h1 class="page-title" style="margin-bottom: 24px;">Create Sprint</h1>
    <form method="POST" class="card">
        <div class="form-group">
            <label class="form-label">Sprint Name</label>
            <input type="text" name="name" class="form-input" required placeholder="e.g., Sprint 5 — Performance">
        </div>
        <div class="form-group">
            <label class="form-label">Sprint Goal</label>
            <textarea name="goal" class="form-textarea" placeholder="What does this sprint aim to achieve?"></textarea>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="date" name="end_date" class="form-input" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Capacity (Story Points)</label>
            <input type="number" name="capacity_points" class="form-input" value="30" min="0">
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" class="btn btn-primary">Create Sprint</button>
            <a href="{{ url_for('project_board', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
