{% extends "base.html" %}
{% block title %}New Project — SprintFlow{% endblock %}
{% block content %}
<div style="max-width: 560px;">
    <h1 class="page-title" style="margin-bottom: 24px;">Create Project</h1>
    <form method="POST" class="card">
        <div class="form-group">
            <label class="form-label">Project Name</label>
            <input type="text" name="name" class="form-input" required placeholder="e.g., Manzanita Health Platform">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="Brief project description"></textarea>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" class="btn btn-primary">Create Project</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
