<!-- templates/login.html -->
{% extends "base.html" %}
{% block title %}Login — SprintFlow{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <h1 class="page-title" style="text-align: center; margin-bottom: 8px;">Welcome back</h1>
    <p class="page-subtitle" style="text-align: center; margin-bottom: 32px;">Sign in to SprintFlow</p>
    <form method="POST" class="card">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-input" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
        <p style="text-align: center; margin-top: 16px; font-size: 14px; color: var(--text-muted);">
            No account? <a href="{{ url_for('register') }}" style="color: var(--accent);">Register</a>
        </p>
    </form>
    <p style="text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted);">
        Demo: username <code style="color: var(--accent);">saanvi</code> / password <code style="color: var(--accent);">password123</code>
    </p>
</div>
{% endblock %}
