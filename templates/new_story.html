{% extends "base.html" %}
{% block title %}New Story — SprintFlow{% endblock %}
{% block content %}
<div style="max-width: 640px;">
    <h1 class="page-title" style="margin-bottom: 24px;">Create User Story</h1>
    <form method="POST" class="card">
        <div class="form-group">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-input" required placeholder="As a user, I want to...">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea" placeholder="Detailed description of the story"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Acceptance Criteria</label>
            <textarea name="acceptance_criteria" class="form-textarea" placeholder="- Given... When... Then...&#10;- Feature works as expected&#10;- Tests pass"></textarea>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Story Points</label>
                <select name="story_points" class="form-select">
                    {% for p in [0,1,2,3,5,8,13,21] %}
                    <option value="{{ p }}">{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option value="critical">🔴 Critical</option>
                    <option value="high">🟠 High</option>
                    <option value="medium" selected>🔵 Medium</option>
                    <option value="low">⚪ Low</option>
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Sprint</label>
                <select name="sprint_id" class="form-select">
                    <option value="">Backlog (no sprint)</option>
                    {% for s in sprints %}
                    <option value="{{ s.id }}">{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Assign To</label>
                <select name="assigned_to" class="form-select">
                    <option value="">Unassigned</option>
                    {% for u in team %}
                    <option value="{{ u.id }}">{{ u.username }} ({{ u.role|replace('_',' ') }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Epic</label>
                <input type="text" name="epic" class="form-input" placeholder="e.g., Auth, Dashboard">
            </div>
            <div class="form-group">
                <label class="form-label">Labels</label>
                <input type="text" name="labels" class="form-input" placeholder="frontend, backend, api">
            </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
            <button type="submit" class="btn btn-primary">Create Story</button>
            <a href="{{ url_for('project_board', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
